baseURL = "https://FlomeWorld.github.io"
languageCode = "en-us"
title = "Curiosity"
theme = "hugo-theme-cleanwhite"
publishDir = "FlomeWorld.github.io"

[services]
  [services.disqus]
    shortname = "Harvey"
  [services.googleAnalytics]
    id = ""

[params]
  header_image = "img/photo_2026-03-03_13-46-56.jpg"
  author = "Harvey"
  description = "Welcome to my blog"
  githubUsername = "FlomeWorld"
  slogan = "Be Curious, Brave, Stay Hungry"
  
  # Sidebar settings
  sidebar_about_description = "AI Infrastructure Architect | Kubernetes & GPU Optimization | Outdoor Adventurer"
  sidebar_avatar = "img/profile.jpg" # Placeholder from theme, user might want to change

  featured_tags = true 
  featured_condition_size = 0 

  about_me = true
  last_posts = true

  [params.social]
  rss            = true 
  email          = "flomeworld@gmail.com"
  github         = "https://github.com/FlomeWorld"
  linkedin       = "https://www.linkedin.com/in/huajian-liu-87920189"

  [[params.additional_menus]]
  title = "ABOUT"
  href = "/about"

  [[params.additional_menus]]
  title = "ARCHIVE"
  href = "/archive"

  [[params.additional_menus]]
  title = "RESEARCH"
  href = "/research"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[caches]
  [caches.images]
    dir = ':cacheDir/images'